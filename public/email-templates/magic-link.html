<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رابط تسجيل الدخول</title>
</head>
<body style="margin:0; padding:0; background:#faf7ff; font-family: Tahoma, 'Segoe UI', Arial, sans-serif; direction:rtl;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf7ff; padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border-radius:24px; overflow:hidden; box-shadow:0 8px 32px rgba(115, 44, 179, 0.08);">

          <tr>
            <td style="background: linear-gradient(135deg, #732cb3 0%, #a855f7 45%, #f97316 100%); padding:40px 32px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:28px; font-weight:900;">عبري ببساطة 🌸</h1>
            </td>
          </tr>

          <tr>
            <td style="padding:40px 32px 24px;">
              <div style="text-align:center; margin-bottom:24px;">
                <div style="display:inline-block; width:72px; height:72px; background:#f4ecff; border-radius:50%; line-height:72px; font-size:36px;">✨</div>
              </div>

              <h2 style="margin:0 0 16px; color:#1a0f2e; font-size:24px; font-weight:800; text-align:center;">
                رابط تسجيل الدخول السحري
              </h2>

              <p style="margin:0 0 28px; color:#5a4a6f; font-size:15px; line-height:1.9; text-align:center;">
                اضغطي الزر أدناه لتسجيل الدخول إلى حسابكِ فوراً — بدون كلمة مرور.
              </p>

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:8px 0 24px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block; background: linear-gradient(135deg, #732cb3 0%, #a855f7 100%); color:#ffffff; text-decoration:none; padding:16px 44px; border-radius:16px; font-size:16px; font-weight:800; box-shadow:0 6px 20px rgba(115, 44, 179, 0.35);">
                      تسجيل الدخول ←
                    </a>
                  </td>
                </tr>
              </table>

              <div style="background:#fff7ed; border-right:4px solid #f97316; border-radius:12px; padding:14px 18px; margin:16px 0;">
                <p style="margin:0; color:#7c2d12; font-size:13px;">⏰ الرابط صالح لمدة ساعة واحدة فقط.</p>
              </div>

              <hr style="border:none; border-top:1px solid #f0e8f9; margin:24px 0;">
              <p style="margin:0; color:#8a7a9f; font-size:13px; text-align:center;">
                إذا لم تطلبي هذا الرابط، تجاهلي الرسالة.
              </p>
            </td>
          </tr>

          <tr>
            <td style="background:#faf7ff; padding:24px 32px; text-align:center; border-top:1px solid #f0e8f9;">
              <p style="margin:0 0 6px; color:#732cb3; font-size:14px; font-weight:800;">عبري ببساطة 🌸</p>
              <p style="margin:12px 0 0; color:#b8a8cf; font-size:11px;">© 2026 عبري ببساطة</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
